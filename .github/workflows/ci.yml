name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, mvp]
  pull_request:
    branches: [main, mvp]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
      VECLIB_MAXIMUM_THREADS: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra catalyst --extra solvation --extra viz

      - name: Run linting (ruff)
        run: uv run ruff check src/ tests/

      - name: Check formatting (black)
        run: uv run black --check src/ tests/ --line-length 100

      - name: Verify pytest collection
        run: uv run pytest tests/ --collect-only -q

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=src/q2m3 \
            --cov-report=xml \
            --cov-report=term \
            -m "not slow and not gpu"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: pytest-${{ matrix.python-version }}
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
