name: Documentation

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-docs:
    name: Build Sphinx documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
      VECLIB_MAXIMUM_THREADS: '1'
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve documentation version
        run: |
          docs_tag="$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || true)"
          if [[ -n "${docs_tag}" ]]; then
            docs_version="${docs_tag#v}"
          else
            docs_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "Q2M3_DOCS_VERSION=${docs_version}" >> "${GITHUB_ENV}"
          echo "Resolved documentation version: ${docs_version}"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install documentation dependencies
        run: uv sync --extra docs --extra catalyst --extra solvation --extra viz

      - name: Build HTML with warnings as errors
        run: uv run sphinx-build -W --keep-going -b html doc/source doc/build/html

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: q2m3-sphinx-html
          path: doc/build/html
          if-no-files-found: error
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/build/html

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
